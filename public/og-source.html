<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=JetBrains+Mono:wght@500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #0a0a0a;
    color: #f5f2ea;
    font-family: 'Anton', sans-serif;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(245, 242, 234, 0.025) 1px, transparent 1px),
      radial-gradient(rgba(0, 212, 255, 0.02) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: screen;
    opacity: 0.7;
    pointer-events: none;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(245, 242, 234, 0.5);
  }
  .top .accent { color: #00d4ff; }
  .wordmark {
    font-size: 220px;
    line-height: 0.86;
    letter-spacing: -0.005em;
    text-transform: uppercase;
  }
  .loud { color: #00d4ff; }
  .tag {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: rgba(245, 242, 234, 0.85);
    max-width: 800px;
    font-weight: 400;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: end;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(245, 242, 234, 0.4);
  }
  .url { color: #00d4ff; font-size: 16px; }
</style>
</head>
<body>
  <div class="top">
    <span><span class="accent">●</span>&nbsp;&nbsp;A WEEKLY LETTER</span>
    <span>BY CHRIS PERALES · GUADALAJARA</span>
  </div>
  <div>
    <div class="wordmark">
      Build Quiet,<br /><span class="loud">Win Loud.</span>
    </div>
    <div class="tag" style="margin-top: 28px;">AI tools, real builds, no hype.</div>
  </div>
  <div class="bottom">
    <span class="url">buildquietwinloud.com</span>
    <span>EST. 2026</span>
  </div>
</body>
</html>
